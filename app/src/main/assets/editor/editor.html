<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CodeForge Editor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --text: #e0e0e0;
    --comment: #6a9955;
    --keyword: #569cd6;
    --string: #ce9178;
    --number: #b5cea8;
    --function: #dcdcaa;
    --class: #4ec9b0;
    --operator: #d4d4d4;
    --tag: #569cd6;
    --attr: #9cdcfe;
    --value: #ce9178;
    --linenum: #858585;
    --selection: #264f78;
    --cursor: #aeafad;
    --primary: #BB86FC;
    --line-height: 22px;
    --font-size: 14px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Fira Code', 'Cascadia Code', 'Consolas', 'Courier New', monospace;
    font-size: var(--font-size);
    line-height: var(--line-height);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  #editor-container {
    display: flex;
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  #line-numbers {
    background: var(--surface);
    color: var(--linenum);
    padding: 8px 4px 8px 8px;
    text-align: right;
    user-select: none;
    min-width: 44px;
    overflow: hidden;
    border-right: 1px solid var(--border);
    font-size: var(--font-size);
    line-height: var(--line-height);
    white-space: pre;
  }

  #scroll-area {
    flex: 1;
    overflow: auto;
    position: relative;
  }

  #editor {
    position: relative;
    min-height: 100%;
    padding: 8px 8px 100px 12px;
    outline: none;
    white-space: pre;
    overflow-wrap: normal;
    caret-color: var(--cursor);
    font-size: var(--font-size);
    line-height: var(--line-height);
    tab-size: 2;
    -webkit-user-modify: read-write-plaintext-only;
  }

  /* Syntax highlighting spans */
  .kw  { color: var(--keyword); font-weight: bold; }
  .str { color: var(--string); }
  .num { color: var(--number); }
  .cmt { color: var(--comment); font-style: italic; }
  .fn  { color: var(--function); }
  .cls { color: var(--class); }
  .op  { color: var(--operator); }
  .tag { color: var(--tag); }
  .atr { color: var(--attr); }
  .val { color: var(--value); }
  .pun { color: #d4d4d4; }
  .typ { color: #4ec9b0; }

  /* Autocomplete dropdown */
  #autocomplete {
    display: none;
    position: fixed;
    background: #252526;
    border: 1px solid #454545;
    border-radius: 4px;
    z-index: 1000;
    max-height: 200px;
    overflow-y: auto;
    min-width: 200px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }
  .ac-item {
    padding: 6px 12px;
    cursor: pointer;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .ac-item:hover, .ac-item.selected {
    background: #094771;
  }
  .ac-kind {
    font-size: 10px;
    color: #888;
    background: #333;
    padding: 1px 4px;
    border-radius: 2px;
    min-width: 24px;
    text-align: center;
  }

  /* Status bar */
  #status-bar {
    background: var(--primary);
    color: #000;
    padding: 2px 12px;
    font-size: 12px;
    display: flex;
    gap: 16px;
    align-items: center;
  }
  #status-bar span { opacity: 0.8; }

  /* Monokai theme */
  body.monokai {
    --bg: #272822;
    --surface: #1e1f1c;
    --border: #3e3d32;
    --text: #f8f8f2;
    --comment: #75715e;
    --keyword: #f92672;
    --string: #e6db74;
    --number: #ae81ff;
    --function: #a6e22e;
    --class: #66d9ef;
  }

  /* Light theme */
  body.light {
    --bg: #ffffff;
    --surface: #f3f3f3;
    --border: #e0e0e0;
    --text: #000000;
    --comment: #008000;
    --keyword: #0000ff;
    --string: #a31515;
    --number: #09885a;
    --function: #795e26;
    --class: #267f99;
    --linenum: #999999;
    --selection: #add6ff;
  }
</style>
</head>
<body>
<div id="editor-container">
  <div id="line-numbers">1</div>
  <div id="scroll-area">
    <div id="editor"
         contenteditable="true"
         spellcheck="false"
         autocorrect="off"
         autocapitalize="off"
         autocomplete="off">
    </div>
  </div>
</div>
<div id="autocomplete"></div>
<div id="status-bar">
  <span id="st-lang">HTML</span>
  <span id="st-pos">Ln 1, Col 1</span>
  <span id="st-lines">1 lines</span>
  <span id="st-encoding">UTF-8</span>
</div>

<script>
// ═══════════════════════════════════════════════════
//  CodeForge Editor Engine
// ═══════════════════════════════════════════════════

const editorEl   = document.getElementById('editor');
const lineNumsEl = document.getElementById('line-numbers');
const scrollArea = document.getElementById('scroll-area');
const acDropdown = document.getElementById('autocomplete');
const stLang     = document.getElementById('st-lang');
const stPos      = document.getElementById('st-pos');
const stLines    = document.getElementById('st-lines');

let currentLanguage = 'html';
let rawContent      = '';
let undoStack       = [];
let redoStack       = [];
let acItems         = [];
let acIndex         = -1;
let fontSize        = 14;

// ── Language keyword sets ─────────────────────────
const KEYWORDS = {
  html: ['html','head','body','div','span','p','a','img','input','button','form',
         'table','tr','td','th','ul','ol','li','h1','h2','h3','h4','h5','h6',
         'script','style','link','meta','title','header','footer','nav','section',
         'article','main','aside','canvas','video','audio','source','select','option',
         'textarea','label','fieldset','legend','figure','figcaption','blockquote',
         'code','pre','br','hr','strong','em','small','sup','sub'],

  css: ['color','background','margin','padding','display','flex','grid','width','height',
        'font','border','position','top','left','right','bottom','overflow','z-index',
        'opacity','transform','transition','animation','box-shadow','border-radius',
        'max-width','min-width','justify-content','align-items','gap','text-align',
        'cursor','content','visibility','float','clear','list-style','outline',
        'none','auto','inherit','block','inline','absolute','relative','fixed','sticky',
        'center','bold','normal','italic','px','em','rem','vh','vw','%'],

  javascript: ['function','var','let','const','return','if','else','for','while','do',
               'switch','case','break','continue','class','extends','new','this','super',
               'import','export','default','async','await','try','catch','finally',
               'typeof','instanceof','null','undefined','true','false','in','of',
               'delete','void','throw','yield','static','get','set','from','Promise',
               'Array','Object','String','Number','Boolean','console','document',
               'window','Math','JSON','Date','localStorage','fetch','then','catch'],

  kotlin: ['fun','val','var','class','object','interface','enum','data','sealed',
           'abstract','open','override','private','public','protected','internal',
           'import','package','if','else','when','for','while','do','return','is',
           'as','in','out','by','companion','init','constructor','get','set',
           'null','true','false','this','super','it','Unit','String','Int','Long',
           'Boolean','Float','Double','List','MutableList','Map','MutableMap',
           'viewModelScope','launch','collect','emit','StateFlow','Flow'],

  java: ['public','private','protected','class','interface','enum','abstract',
         'static','final','void','int','long','boolean','String','float','double',
         'byte','char','short','new','this','super','extends','implements','import',
         'package','return','if','else','for','while','do','switch','case','break',
         'continue','try','catch','finally','throw','throws','null','true','false',
         'instanceof','synchronized','volatile','transient','native','strictfp'],

  xml: ['xml','android','app','tools','layout_width','layout_height','match_parent',
        'wrap_content','id','text','textSize','textColor','background','gravity',
        'orientation','horizontal','vertical','visibility','gone','visible',
        'padding','margin','drawable','color','dimen','string','style']
};

// ── Syntax Tokenizer ──────────────────────────────
function tokenize(code, lang) {
  if (lang === 'html' || lang === 'xml') return tokenizeMarkup(code, lang);
  if (lang === 'css') return tokenizeCSS(code);
  return tokenizeCode(code, lang);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function tokenizeCode(code, lang) {
  const kws = new Set(KEYWORDS[lang] || []);
  // Simple state-machine tokenizer
  let result = '';
  let i = 0;
  const len = code.length;

  while (i < len) {
    // Single-line comment
    if ((code[i]==='/' && code[i+1]==='/') ||
        (lang==='kotlin' && code[i]==='/' && code[i+1]==='/')) {
      let j = i;
      while (j < len && code[j] !== '\n') j++;
      result += `<span class="cmt">${escHtml(code.slice(i,j))}</span>`;
      i = j;
      continue;
    }
    // Multi-line comment
    if (code[i]==='/' && code[i+1]==='*') {
      let j = i+2;
      while (j < len-1 && !(code[j]==='*' && code[j+1]==='/')) j++;
      j += 2;
      result += `<span class="cmt">${escHtml(code.slice(i,j))}</span>`;
      i = j;
      continue;
    }
    // Strings
    if (code[i]==='"' || code[i]==="'" || code[i]==='`') {
      const q = code[i];
      let j = i+1;
      while (j < len && (code[j] !== q || code[j-1]==='\\') && code[j]!=='\n') j++;
      if (code[j]===q) j++;
      result += `<span class="str">${escHtml(code.slice(i,j))}</span>`;
      i = j;
      continue;
    }
    // Numbers
    if (/[0-9]/.test(code[i]) || (code[i]==='.' && /[0-9]/.test(code[i+1]||''))) {
      let j = i;
      while (j < len && /[0-9._xXbBoOeE]/.test(code[j])) j++;
      result += `<span class="num">${escHtml(code.slice(i,j))}</span>`;
      i = j;
      continue;
    }
    // Identifiers / keywords
    if (/[a-zA-Z_$]/.test(code[i])) {
      let j = i;
      while (j < len && /[a-zA-Z0-9_$]/.test(code[j])) j++;
      const word = code.slice(i,j);
      const next = code[j] || '';
      if (kws.has(word)) {
        result += `<span class="kw">${escHtml(word)}</span>`;
      } else if (next === '(') {
        result += `<span class="fn">${escHtml(word)}</span>`;
      } else if (/^[A-Z]/.test(word)) {
        result += `<span class="cls">${escHtml(word)}</span>`;
      } else {
        result += escHtml(word);
      }
      i = j;
      continue;
    }
    // Operators
    if (/[+\-*/%=<>!&|^~?:]/.test(code[i])) {
      result += `<span class="op">${escHtml(code[i])}</span>`;
      i++;
      continue;
    }
    result += escHtml(code[i]);
    i++;
  }
  return result;
}

function tokenizeMarkup(code, lang) {
  let result = '';
  let i = 0;
  const len = code.length;

  while (i < len) {
    if (code[i] === '<') {
      if (code.slice(i,i+4) === '<!--') {
        let j = code.indexOf('-->',i+4);
        j = j === -1 ? len : j+3;
        result += `<span class="cmt">${escHtml(code.slice(i,j))}</span>`;
        i = j;
      } else {
        // Tag
        result += '<span class="tag">&lt;';
        i++;
        if (code[i]==='/') { result += '/'; i++; }
        let j = i;
        while (j < len && /[a-zA-Z0-9:-]/.test(code[j])) j++;
        result += `${escHtml(code.slice(i,j))}`;
        i = j;
        // Attributes
        while (i < len && code[i] !== '>') {
          if (/[a-zA-Z_]/.test(code[i])) {
            let k = i;
            while (k < len && /[a-zA-Z0-9:_-]/.test(code[k])) k++;
            result += `</span><span class="atr">${escHtml(code.slice(i,k))}</span><span class="tag">`;
            i = k;
          } else if (code[i]==='"' || code[i]==="'") {
            const q = code[i]; let k = i+1;
            while (k < len && code[k]!==q) k++;
            if (code[k]===q) k++;
            result += `</span><span class="val">${escHtml(code.slice(i,k))}</span><span class="tag">`;
            i = k;
          } else { result += escHtml(code[i]); i++; }
        }
        if (i < len) { result += '&gt;</span>'; i++; }
      }
    } else {
      result += escHtml(code[i]);
      i++;
    }
  }
  return result;
}

function tokenizeCSS(code) {
  let result = '';
  let i = 0;
  const len = code.length;

  while (i < len) {
    // Comments
    if (code[i]==='/' && code[i+1]==='*') {
      let j = code.indexOf('*/',i+2);
      j = j===-1 ? len : j+2;
      result += `<span class="cmt">${escHtml(code.slice(i,j))}</span>`;
      i = j; continue;
    }
    // Strings
    if (code[i]==='"' || code[i]==="'") {
      const q = code[i]; let j = i+1;
      while (j<len && code[j]!==q) j++;
      if (code[j]===q) j++;
      result += `<span class="str">${escHtml(code.slice(i,j))}</span>`;
      i = j; continue;
    }
    // Selectors / Properties
    if (/[a-zA-Z-]/.test(code[i]) && code[i]!=='-') {
      let j = i;
      while (j<len && /[a-zA-Z0-9-]/.test(code[j])) j++;
      const word = code.slice(i,j);
      const next = code.slice(j).trimStart();
      if (next.startsWith(':') || next.startsWith('{')) {
        result += `<span class="fn">${escHtml(word)}</span>`;
      } else if (KEYWORDS.css.includes(word)) {
        result += `<span class="kw">${escHtml(word)}</span>`;
      } else { result += escHtml(word); }
      i = j; continue;
    }
    // Numbers + units
    if (/[0-9]/.test(code[i]) || (code[i]==='.' && /[0-9]/.test(code[i+1]||''))) {
      let j = i;
      while (j<len && /[0-9.]/.test(code[j])) j++;
      while (j<len && /[a-zA-Z%]/.test(code[j])) j++;
      result += `<span class="num">${escHtml(code.slice(i,j))}</span>`;
      i = j; continue;
    }
    // Hex colors
    if (code[i]==='#') {
      let j = i+1;
      while (j<len && /[0-9a-fA-F]/.test(code[j])) j++;
      result += `<span class="num">${escHtml(code.slice(i,j))}</span>`;
      i = j; continue;
    }
    result += escHtml(code[i]); i++;
  }
  return result;
}

// ── Render highlighted code ───────────────────────
function render(scrollTop) {
  const st = scrollTop !== undefined ? scrollTop : scrollArea.scrollTop;
  const highlighted = tokenize(rawContent, currentLanguage);
  editorEl.innerHTML = highlighted;
  updateLineNumbers();
  scrollArea.scrollTop = st;
  updateStatus();
  syncScroll();
}

function updateLineNumbers() {
  const lines = rawContent.split('\n').length;
  stLines.textContent = `${lines} lines`;
  let nums = '';
  for (let i = 1; i <= lines; i++) nums += i + '\n';
  lineNumsEl.textContent = nums;
}

function syncScroll() {
  lineNumsEl.style.paddingTop = '0';
  scrollArea.addEventListener('scroll', () => {
    lineNumsEl.scrollTop = scrollArea.scrollTop;
  }, { passive: true });
}

function updateStatus() {
  const sel = window.getSelection();
  if (sel && sel.rangeCount > 0) {
    const range = sel.getRangeAt(0);
    const preRange = document.createRange();
    preRange.setStart(editorEl, 0);
    preRange.setEnd(range.startContainer, range.startOffset);
    const preText = preRange.toString();
    const lines = preText.split('\n');
    stPos.textContent = `Ln ${lines.length}, Col ${lines[lines.length-1].length+1}`;
  }
}

// ── Get / Set value ───────────────────────────────
function getValue() {
  return rawContent;
}

function setValue(content, lang) {
  if (lang) currentLanguage = lang;
  rawContent = content;
  stLang.textContent = (lang||currentLanguage).toUpperCase();
  pushUndo();
  render(0);
}

function setTheme(theme) {
  document.body.className = theme === 'monokai' ? 'monokai' : theme === 'light' ? 'light' : '';
}

function setFontSize(size) {
  fontSize = size;
  document.documentElement.style.setProperty('--font-size', size + 'px');
}

function formatCode() {
  // Basic indent formatter
  const lines = rawContent.split('\n');
  let indent = 0;
  const formatted = lines.map(line => {
    const trimmed = line.trim();
    if (!trimmed) return '';
    if (trimmed.startsWith('}') || trimmed.startsWith(')') ||
        trimmed.startsWith('</') || trimmed === '</') {
      indent = Math.max(0, indent - 1);
    }
    const result = '  '.repeat(indent) + trimmed;
    if (trimmed.endsWith('{') || trimmed.endsWith('(') ||
        (trimmed.startsWith('<') && !trimmed.startsWith('</') &&
         !trimmed.endsWith('/>') && !trimmed.includes('</'))) {
      indent++;
    }
    return result;
  });
  rawContent = formatted.join('\n');
  render();
}

// ── Undo / Redo ───────────────────────────────────
function pushUndo() {
  undoStack.push(rawContent);
  if (undoStack.length > 100) undoStack.shift();
  redoStack = [];
}

function undo() {
  if (undoStack.length <= 1) return;
  redoStack.push(undoStack.pop());
  rawContent = undoStack[undoStack.length-1] || '';
  render();
}

function redo() {
  if (!redoStack.length) return;
  const next = redoStack.pop();
  undoStack.push(next);
  rawContent = next;
  render();
}

// ── Autocomplete ──────────────────────────────────
function getWordAtCursor() {
  const sel = window.getSelection();
  if (!sel || !sel.rangeCount) return '';
  const range = sel.getRangeAt(0);
  const preText = range.toString();
  const fullText = rawContent;
  const offset = getCaretOffset();
  let start = offset;
  while (start > 0 && /[a-zA-Z0-9_]/.test(fullText[start-1])) start--;
  return fullText.slice(start, offset);
}

function getCaretOffset() {
  const sel = window.getSelection();
  if (!sel || !sel.rangeCount) return 0;
  const range = document.createRange();
  range.setStart(editorEl, 0);
  range.setEnd(sel.getRangeAt(0).startContainer, sel.getRangeAt(0).startOffset);
  return range.toString().length;
}

function showAutocomplete(word) {
  if (!word || word.length < 2) { hideAutocomplete(); return; }
  const kws = KEYWORDS[currentLanguage] || [];
  const matches = kws.filter(k => k.startsWith(word) && k !== word);
  if (!matches.length) { hideAutocomplete(); return; }

  acItems = matches.slice(0, 10);
  acIndex = -1;
  acDropdown.innerHTML = acItems.map((item, i) =>
    `<div class="ac-item" onclick="applyAc(${i})">
      <span class="ac-kind">${currentLanguage.slice(0,2).toUpperCase()}</span>
      ${item}
    </div>`
  ).join('');

  const sel = window.getSelection();
  if (sel && sel.rangeCount) {
    const rect = sel.getRangeAt(0).getBoundingClientRect();
    acDropdown.style.left = rect.left + 'px';
    acDropdown.style.top = (rect.bottom + 4) + 'px';
  }
  acDropdown.style.display = 'block';
}

function hideAutocomplete() {
  acDropdown.style.display = 'none';
  acItems = [];
  acIndex = -1;
}

function applyAc(index) {
  const word = acItems[index];
  if (!word) return;
  const offset = getCaretOffset();
  let start = offset;
  while (start > 0 && /[a-zA-Z0-9_]/.test(rawContent[start-1])) start--;
  rawContent = rawContent.slice(0, start) + word + rawContent.slice(offset);
  hideAutocomplete();
  render();
  // Restore cursor after the inserted word
  setTimeout(() => {
    setCaretOffset(start + word.length);
  }, 0);
}

function setCaretOffset(offset) {
  const walker = document.createTreeWalker(editorEl, NodeFilter.SHOW_TEXT);
  let node;
  let remaining = offset;
  while ((node = walker.nextNode())) {
    if (remaining <= node.textContent.length) {
      const range = document.createRange();
      range.setStart(node, remaining);
      range.collapse(true);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
      return;
    }
    remaining -= node.textContent.length;
  }
}

// ── Input handling ────────────────────────────────
editorEl.addEventListener('input', (e) => {
  const scrollTop = scrollArea.scrollTop;
  rawContent = editorEl.innerText.replace(/\u00a0/g, ' ');
  pushUndo();

  // Debounced re-highlight
  clearTimeout(editorEl._renderTimer);
  editorEl._renderTimer = setTimeout(() => {
    const sel = window.getSelection();
    const offset = getCaretOffset();
    render(scrollTop);
    setTimeout(() => setCaretOffset(offset), 0);
  }, 80);

  // Autocomplete
  const word = getWordAtCursor();
  showAutocomplete(word);

  // Notify Android
  if (window.EditorBridge) {
    EditorBridge.onContentChanged(rawContent);
  }
});

editorEl.addEventListener('keydown', (e) => {
  // Autocomplete navigation
  if (acDropdown.style.display === 'block') {
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      acIndex = Math.min(acIndex+1, acItems.length-1);
      document.querySelectorAll('.ac-item').forEach((el,i) =>
        el.classList.toggle('selected', i === acIndex));
      return;
    }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      acIndex = Math.max(acIndex-1, 0);
      document.querySelectorAll('.ac-item').forEach((el,i) =>
        el.classList.toggle('selected', i === acIndex));
      return;
    }
    if (e.key === 'Enter' || e.key === 'Tab') {
      if (acIndex >= 0) { e.preventDefault(); applyAc(acIndex); return; }
      hideAutocomplete();
    }
    if (e.key === 'Escape') { hideAutocomplete(); return; }
  }

  // Tab key → 2 spaces
  if (e.key === 'Tab') {
    e.preventDefault();
    document.execCommand('insertText', false, '  ');
    return;
  }

  // Ctrl+S → save
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    if (window.EditorBridge) EditorBridge.log('save');
    return;
  }

  // Ctrl+Z → undo
  if ((e.ctrlKey || e.metaKey) && !e.shiftKey && e.key === 'z') {
    e.preventDefault(); undo(); return;
  }

  // Ctrl+Shift+Z or Ctrl+Y → redo
  if ((e.ctrlKey || e.metaKey) && (e.shiftKey && e.key === 'z' || e.key === 'y')) {
    e.preventDefault(); redo(); return;
  }

  // Auto-close brackets
  const pairs = {'(':')', '[':']', '{':'}', '"':'"', "'":"'", '`':'`'};
  if (pairs[e.key]) {
    e.preventDefault();
    document.execCommand('insertText', false, e.key + pairs[e.key]);
    const sel = window.getSelection();
    if (sel && sel.rangeCount) {
      const range = sel.getRangeAt(0);
      range.setStart(range.startContainer, range.startOffset - 1);
      range.collapse(true);
      sel.removeAllRanges();
      sel.addRange(range);
    }
    return;
  }
});

editorEl.addEventListener('click', updateStatus);
editorEl.addEventListener('keyup', updateStatus);

// Hide autocomplete on outside click
document.addEventListener('click', (e) => {
  if (!acDropdown.contains(e.target)) hideAutocomplete();
});

// ── Public API (called by Android) ───────────────
window.editor = {
  getValue,
  setValue,
  undo,
  redo,
  formatCode,
  setTheme,
  setFontSize
};

// Initialize with empty HTML content
setValue('<!-- Start editing your code here -->', 'html');
</script>
</body>
